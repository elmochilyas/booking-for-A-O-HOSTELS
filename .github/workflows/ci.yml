name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, pdo_mysql

      - name: Get Composer Cache
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: |
          rm -f backend/composer.lock
          cd backend && composer update --prefer-lowest --no-interaction

      - name: Run PHP CS Fixer
        run: cd backend && ./vendor/bin/pint --test

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, pdo_mysql

      - name: Get Composer Cache
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: |
          rm -f backend/composer.lock
          cd backend && composer update --prefer-lowest --no-interaction

      - name: Run PHPUnit
        run: cd backend && ./vendor/bin/phpunit --coverage

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Get npm Cache
        uses: actions/cache@v3
        with:
          path: |
            frontend/mobile/node_modules
            frontend/admin/node_modules
            frontend/guest/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/*/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Dependencies
        run: |
          cd frontend/mobile && npm install
          cd ../admin && npm install
          cd ../guest && npm install

      - name: Run ESLint
        run: |
          cd frontend/mobile && npm run lint || true
          cd ../admin && npm run lint || true
          cd ../guest && npm run lint || true

      - name: Run TypeScript Check
        run: |
          cd frontend/mobile && npm run typecheck || true
          cd ../admin && npm run typecheck || true
          cd ../guest && npm run typecheck || true
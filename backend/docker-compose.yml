version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ao_hostels_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - ao_network

  db:
    image: mysql:8.0
    container_name: ao_hostels_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ao_hostels
      - MYSQL_USER=ao_user
      - MYSQL_PASSWORD=ao_pass
    volumes:
      - ao_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ao_network

  redis:
    image: redis:7-alpine
    container_name: ao_hostels_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ao_network

  nginx:
    image: nginx:alpine
    container_name: ao_hostels_nginx
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - ao_network

networks:
  ao_network:
    driver: bridge

volumes:
  ao_mysql_data: